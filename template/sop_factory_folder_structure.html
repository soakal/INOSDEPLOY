<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Factory — Folder Structure</title>
<style>
  body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #fff; }
  svg text { font-family: Arial, sans-serif; }
  .node { cursor: pointer; }
  .node:hover rect { opacity: 0.85; }
  .t  { font-size: 14px; font-weight: 400; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .c-blue  rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue  .th, .c-blue  .ts, .c-blue  .t { fill: #0C447C; }
  .c-teal  rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  .th, .c-teal  .ts, .c-teal  .t { fill: #085041; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th, .c-amber .ts, .c-amber .t { fill: #633806; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th, .c-green .ts, .c-green .t { fill: #27500A; }
  .c-gray  rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray  .th, .c-gray  .ts, .c-gray  .t { fill: #2C2C2A; }
  line { stroke: #ccc; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">

  <!-- ROOT -->
  <g class="node c-blue">
    <rect x="40" y="20" width="600" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">SOP_factory\</text>
  </g>
  <line x1="80" y1="64" x2="80" y2="450" stroke-width="1.5"/>

  <!-- _template\ -->
  <line x1="80" y1="108" x2="120" y2="108" stroke-width="1.5"/>
  <g class="node c-teal">
    <rect x="120" y="86" width="520" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="146" y="108" dominant-baseline="central">_template\</text>
    <text class="ts" x="632" y="108" text-anchor="end" dominant-baseline="central">never edit contents</text>
  </g>
  <line x1="160" y1="130" x2="160" y2="276" stroke-width="1"/>

  <line x1="160" y1="156" x2="196" y2="156" stroke-width="1"/>
  <g class="c-gray">
    <rect x="196" y="138" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="156" dominant-baseline="central">SOP_TEMPLATE_WITH_PHOTOS.docx</text>
    <text class="ts" x="624" y="156" text-anchor="end" dominant-baseline="central">Word skeleton — VRSI header, logo, placeholders</text>
  </g>

  <line x1="160" y1="204" x2="196" y2="204" stroke-width="1"/>
  <g class="c-gray">
    <rect x="196" y="186" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="204" dominant-baseline="central">SOP_TEMPLATE.md</text>
    <text class="ts" x="624" y="204" text-anchor="end" dominant-baseline="central">formatting rules + image naming convention</text>
  </g>

  <line x1="160" y1="252" x2="196" y2="252" stroke-width="1"/>
  <g class="c-gray">
    <rect x="196" y="234" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="252" dominant-baseline="central">PROMPT.txt</text>
    <text class="ts" x="624" y="252" text-anchor="end" dominant-baseline="central">Cowork prompt — edit sections 3, 4, 5 each run</text>
  </g>

  <!-- _active\ -->
  <line x1="80" y1="318" x2="120" y2="318" stroke-width="1.5"/>
  <g class="node c-amber">
    <rect x="120" y="296" width="520" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="146" y="318" dominant-baseline="central">_active\</text>
    <text class="ts" x="632" y="318" text-anchor="end" dominant-baseline="central">clear before each run — flat, no subfolders</text>
  </g>
  <line x1="160" y1="340" x2="160" y2="420" stroke-width="1"/>

  <line x1="160" y1="364" x2="196" y2="364" stroke-width="1"/>
  <g class="c-gray">
    <rect x="196" y="346" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="364" dominant-baseline="central">*.ps1  *.bat  *.txt  *.md  *.docx</text>
    <text class="ts" x="624" y="364" text-anchor="end" dominant-baseline="central">scripts + notes — any filename</text>
  </g>

  <line x1="160" y1="408" x2="196" y2="408" stroke-width="1"/>
  <g class="c-amber">
    <rect x="196" y="390" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="408" dominant-baseline="central">01_name.png  02_name.png  03_name.png ...</text>
    <text class="ts" x="624" y="408" text-anchor="end" dominant-baseline="central">screenshots — must be numbered 01_ 02_ 03_</text>
  </g>

  <!-- _output\ -->
  <line x1="80" y1="450" x2="120" y2="450" stroke-width="1.5"/>
  <g class="node c-green">
    <rect x="120" y="428" width="520" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="146" y="450" dominant-baseline="central">_output\</text>
    <text class="ts" x="632" y="450" text-anchor="end" dominant-baseline="central">finished SOPs saved here by Cowork</text>
  </g>
  <line x1="160" y1="472" x2="160" y2="490" stroke-width="1"/>
  <line x1="160" y1="490" x2="196" y2="490" stroke-width="1"/>
  <g class="c-gray">
    <rect x="196" y="472" width="436" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="212" y="490" dominant-baseline="central">SOP_topic_v1.0.docx  ...</text>
    <text class="ts" x="624" y="490" text-anchor="end" dominant-baseline="central">output .docx files</text>
  </g>

</svg>
</body>
</html>
